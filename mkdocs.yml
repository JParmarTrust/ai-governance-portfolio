site_name: AI Governance Portfolio
site_description: Personal Knowledge Base & Guidance Papers
site_author: J
repo_name: ai-governance-portfolio
repo_url: https://github.com/JParmarTrust/ai-governance-portfolio

theme:
  name: material
  logo: images/logo.png
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - content.code.annotate
    - content.tabs.link
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - AI Governance:
      - Risk Categories: ai-governance/risk-categories.md
      - Power Automate vs Copilot Studio: ai-governance/automation-comparison.md
  - Compliance & Risks: compliance.md
  - About: about.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist
  - admonition
  - attr_list
  - footnotes

plugins:
  - search
  - git-revision-date-localized